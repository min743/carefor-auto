name: 지점점검 (평일 매일 아침)

on:
  # 평일 07:00 정시 실행은 cron-job.org가 담당 — test_mode=false dispatch (2026-07-11).
  #   GitHub schedule은 9~12h 지연돼 제거(중복 스캔 방지). 수동은 아래 workflow_dispatch.
  workflow_dispatch:
    inputs:
      test_mode:
        description: '테스트 모드 (저장·시트업로드·요약갱신 없이 동작만 확인)'
        required: false
        default: 'true'
        type: choice
        options: ['true', 'false']
      branch:
        description: '점검할 지점 (전체 또는 지점명)'
        required: false
        default: '전체'
        type: choice
        options: ['전체', '둔산점', '서구점', '천안점', '청주 오창점']
      limit:
        description: '지점당 인원 제한 (0=전체, 테스트 모드 기본 3명)'
        required: false
        default: '0'

# 동시 실행 방지: cron과 수동 dispatch가 겹쳐도 순차 실행
concurrency:
  group: branch-audit
  cancel-in-progress: false

permissions:
  contents: write   # 요약페이지(docs/audit_summary.html) 커밋용

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 패키지 설치
        run: pip install requests PyYAML playwright keyring keyrings.alt openpyxl

      - name: Playwright 브라우저 설치
        run: playwright install chromium --with-deps

      # 34② 판정용 결과평가 팝업 수집. judge()는 audit_results/결과평가_<지점>/index.json 을 읽는데
      # 그건 로컬 수집물(수급자명·총평=개인정보라 커밋 금지)이라 CI 러너엔 없어 ②가 조용히 스킵됐다.
      # → CI가 매 실행마다 직접 수집(러너 안에서만 사용, 커밋하지 않음).
      # continue-on-error: 수집이 실패해도 본 점검은 그대로 진행되고 ②만 스킵된다(기존 동작과 동일).
      - name: 34② 결과평가 수집 (러너 내 임시 — 커밋 안 함)
        continue-on-error: true
        timeout-minutes: 90   # 수집이 늘어져도 본 점검(154분) + 6시간 잡 한도를 넘기지 않게 상한
        env:
          CAREFOR_ID:  ${{ secrets.CAREFOR_ID }}
          CAREFOR_PW:  ${{ secrets.CAREFOR_PW }}
          CONFIG_YAML: ${{ secrets.CONFIG_YAML }}
          CI: "true"
        run: |
          for b in "청주" "둔산" "서구" "천안"; do
            echo "── 결과평가 수집: $b"
            python -m audit.collect_result_eval "$b" || echo "  $b 수집 실패 — 34② 스킵됨(점검은 계속)"
          done

      - name: 지점 점검 실행
        env:
          CAREFOR_ID:        ${{ secrets.CAREFOR_ID }}
          CAREFOR_PW:        ${{ secrets.CAREFOR_PW }}
          CONFIG_YAML:       ${{ secrets.CONFIG_YAML }}
          AUDIT_WEBHOOK_URL: ${{ secrets.AUDIT_WEBHOOK_URL }}
          NOTION_TOKEN:      ${{ secrets.NOTION_TOKEN }}
          AUDIT_LIMIT:       ${{ github.event.inputs.limit || '0' }}
          AUDIT_TEST:        ${{ github.event.inputs.test_mode || 'false' }}
          AUDIT_BRANCH:      ${{ github.event.inputs.branch }}
          CI: "true"
        run: python run_audit_headless.py

      - name: 본부 대시보드 발행 (이름 제거)
        # 로컬 audit_results/dashboard_data.js(실명 포함) → docs/ 이름 제거본 생성
        if: ${{ !cancelled() && github.event.inputs.test_mode != 'true' }}
        run: python -m audit.publish_hq_dashboard

      - name: 요약페이지·대시보드 커밋 (개인정보 없음)
        # 시트 업로드가 실패(예: webhook 403)해도 스캔 중 생성된 요약페이지는 갱신·게시 (결과는 공개 요약페이지로 확인)
        if: ${{ !cancelled() && github.event.inputs.test_mode != 'true' }}
        run: |
          git config user.name "audit-bot"
          git config user.email "actions@github.com"
          git add docs/audit_summary.html docs/dashboard_data.js docs/branch_dashboard.html
          if git diff --cached --quiet; then
            echo "요약페이지 변경 없음"
          else
            git commit -m "chore: 지점점검 요약·본부대시보드 자동 갱신 [skip ci]"
            git pull --rebase origin ${{ github.ref_name }} && git push origin HEAD:${{ github.ref_name }}
          fi

      - name: 실패 알림 (슬랙, 통합 알림 채널)
        if: failure()
        run: |
          curl -s -X POST https://slack.com/api/chat.postMessage \
            -H "Authorization: Bearer ${{ secrets.SLACK_BOT_TOKEN }}" \
            -H 'Content-type: application/json; charset=utf-8' \
            -d '{"channel":"C0BC37EB38C","text":"⚠️ 지점점검 자동 실행 실패 — GitHub Actions 로그 확인 필요 (weekly_audit)"}'
