name: 지점점검 (평일 매일 아침)

on:
  # 평일 07:00 정시 실행은 cron-job.org가 담당 — test_mode=false dispatch (2026-07-11).
  #   GitHub schedule은 9~12h 지연돼 제거(중복 스캔 방지). 수동은 아래 workflow_dispatch.
  workflow_dispatch:
    inputs:
      test_mode:
        description: '테스트 모드 (저장·시트업로드·요약갱신 없이 동작만 확인)'
        required: false
        default: 'true'
        type: choice
        options: ['true', 'false']
      branch:
        description: '점검할 지점 (전체 또는 지점명)'
        required: false
        default: '전체'
        type: choice
        options: ['전체', '둔산점', '서구점', '천안점', '청주 오창점']
      limit:
        description: '지점당 인원 제한 (0=전체, 테스트 모드 기본 3명)'
        required: false
        default: '0'

# 동시 실행 방지: cron과 수동 dispatch가 겹쳐도 순차 실행
concurrency:
  group: branch-audit
  cancel-in-progress: false

permissions:
  contents: write   # 요약페이지(docs/audit_summary.html) 커밋용

# ── 구조 (2026-07-17 matrix 병렬화) ──────────────────────────────────────────
#   setup  → 점검할 지점 목록을 matrix JSON 으로 산출
#   audit  → 지점당 러너 1개(병렬). 자기 지점의 결과평가(34②)·청구발송(34③) 수집까지
#            job 안에서 하고, 결과를 '암호화'해 아티팩트로 올린다. 커밋·시트업로드 안 함.
#   merge  → 아티팩트를 모아 복호화 → 대시보드 데이터·요약페이지 재생성 → 구글시트 업로드
#            → docs/ 커밋. 커밋은 이 job 에서만 한다(4개 job 이 동시에 push 하면 충돌).
#
#   ⚠️ 아티팩트 암호화 이유: public 저장소의 Actions 아티팩트는 저장소를 볼 수 있는
#      누구나(=인터넷 전체) 내려받을 수 있다. audit_results/<지점>.json 에는 수급자·직원
#      실명이 들어 있어 평문으로 올리면 공개 유출이다. AES256 대칭키로 암호화해 올리고
#      merge job 에서만 푼다. 키는 secrets.AUDIT_ARTIFACT_KEY (아무 긴 랜덤 문자열).
# ───────────────────────────────────────────────────────────────────────────

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.gen.outputs.matrix }}
    steps:
      - name: 점검 대상 지점 목록 산출
        id: gen
        env:
          SEL: ${{ github.event.inputs.branch }}
        run: |
          python3 - >> "$GITHUB_OUTPUT" <<'PY'
          import json, os
          # key: 아티팩트 이름·파일명용 ASCII 별칭 (지점명에는 공백이 있어 그대로 쓰기 불편)
          ALL = [
              {"name": "둔산점",      "key": "dunsan"},
              {"name": "서구점",      "key": "seogu"},
              {"name": "천안점",      "key": "cheonan"},
              {"name": "청주 오창점", "key": "cheongju"},
          ]
          sel = (os.environ.get("SEL") or "").strip()
          inc = ALL if sel in ("", "전체") else [b for b in ALL if b["name"] == sel]
          if not inc:
              raise SystemExit(f"ERROR: 알 수 없는 지점 '{sel}'")
          print("matrix=" + json.dumps({"include": inc}, ensure_ascii=False))
          PY

  audit:
    needs: setup
    runs-on: ubuntu-latest
    # 단일 러너 350분 → 지점 1개분으로 축소.
    # 실측 최장 천안점 45분 + 수집(34② ~4분 + 34③ ~2분 + 20① ~4.5분) + 설치 3분 ≈ 59분.
    # 러너가 느려지거나 인원이 늘어도 견디도록 120분.
    timeout-minutes: 120
    strategy:
      # 한 지점이 실패해도 나머지 지점은 끝까지 — merge 는 성공한 지점만 반영한다
      # (단일 러너 때도 지점 실패는 건너뛰고 계속 진행했다: run_audit_headless 의 failed 리스트).
      fail-fast: false
      matrix: ${{ fromJSON(needs.setup.outputs.matrix) }}

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 패키지 설치
        run: pip install requests PyYAML playwright keyring keyrings.alt openpyxl

      - name: Playwright 브라우저 설치
        run: playwright install chromium --with-deps

      # 34② 판정용 결과평가 팝업 수집. judge()는 audit_results/결과평가_<지점>/index.json 을 읽는데
      # 그건 로컬 수집물(수급자명·총평=개인정보라 커밋 금지)이라 CI 러너엔 없어 ②가 조용히 스킵됐다.
      # → CI가 매 실행마다 직접 수집(러너 안에서만 사용, 커밋하지 않음).
      # matrix 병렬화 후: 4지점 일괄이 아니라 이 job 의 지점 하나만 수집한다(실측 4지점 14분 → 지점당 ~4분).
      # continue-on-error: 수집이 실패해도 본 점검은 그대로 진행되고 ②만 스킵된다(기존 동작과 동일).
      - name: 34② 결과평가 수집 (러너 내 임시 — 커밋 안 함)
        continue-on-error: true
        timeout-minutes: 40
        env:
          CAREFOR_ID:  ${{ secrets.CAREFOR_ID }}
          CAREFOR_PW:  ${{ secrets.CAREFOR_PW }}
          CONFIG_YAML: ${{ secrets.CONFIG_YAML }}
          BRANCH:      ${{ matrix.name }}
          CI: "true"
        # audit.collect_result_eval 을 직접 부르면 안 된다 — 로컬 전제(keyring 자격증명 +
        # config_path() 의 config.yaml)라 CI 에서 실패한다. headless 래퍼가 env 주입을 해준다.
        run: python collect_result_eval_headless.py "$BRANCH"

      # 34③ 판정용 7-1 청구서 발송이력 수집. judge3()는 audit_results/청구발송_<지점>.json 을 읽는데
      # 그것도 로컬 수집물(수급자명=개인정보라 커밋 금지)이라 CI 러너엔 없어 ③이 조용히 스킵됐다(34②와 동일 원인).
      # 청구년월은 지점별 BRANCH_CUTOFFS(평가기간 시작)부터 이번 달까지 — judge3()가 그 이전 월을
      # 어차피 버리므로 판정은 동일하고 월별 루프가 짧아진다(실측 4지점 합계 93개월 ≈ 8분 → 지점당 ~2분).
      # continue-on-error: 수집이 실패해도 본 점검은 그대로 진행되고 ③만 스킵된다(기존 동작과 동일).
      - name: 34③ 청구발송이력 수집 (러너 내 임시 — 커밋 안 함)
        continue-on-error: true
        timeout-minutes: 30
        env:
          CAREFOR_ID:  ${{ secrets.CAREFOR_ID }}
          CAREFOR_PW:  ${{ secrets.CAREFOR_PW }}
          CONFIG_YAML: ${{ secrets.CONFIG_YAML }}
          BRANCH:      ${{ matrix.name }}
          CI: "true"
        # audit.collect_billing_history 를 직접 부르면 안 된다 — 34②와 같은 로컬 전제(keyring +
        # config_path() 의 config.yaml)라 CI 에서 실패한다. headless 래퍼가 env 주입을 해준다.
        run: python collect_billing_history_headless.py "$BRANCH"

      # 20① 판정용 욕구사정 상세 폼 수집. item20.judge()는 audit_results/needs_full_<지점>.json 을
      # 읽는데 그것도 로컬 수집물(수급자명·총평·판단근거=개인정보라 커밋 금지)이라 CI 러너엔 없다.
      # 34②③과 달리 20①은 없으면 조용히 스킵하지 않고 '주의(미수집)'로 뜬다 — 안 본 걸 양호로 두지 않는다.
      # collect_needs_full 의 want 프리필터를 없애 목록 전원을 긁으므로 base scan(본 점검) 전에 돌 수 있다.
      # 실측 인당 1.01초 → 지점당 3~4.5분 예상(목록 전원 기준).
      # continue-on-error: 수집이 실패해도 본 점검은 그대로 진행되고 20①만 '주의'가 된다.
      - name: 20① 욕구사정 상세 수집 (러너 내 임시 — 커밋 안 함)
        continue-on-error: true
        timeout-minutes: 30
        env:
          CAREFOR_ID:  ${{ secrets.CAREFOR_ID }}
          CAREFOR_PW:  ${{ secrets.CAREFOR_PW }}
          CONFIG_YAML: ${{ secrets.CONFIG_YAML }}
          BRANCH:      ${{ matrix.name }}
          CI: "true"
        # audit.collect_needs_full 을 직접 부르면 안 된다 — 34②③과 같은 로컬 전제(keyring +
        # config_path() 의 config.yaml)라 CI 에서 실패한다. headless 래퍼가 env 주입을 해준다.
        run: python collect_needs_full_headless.py "$BRANCH"

      # 18① 판정용 롱텀 공개조회(정보 게시율) 수집.
      # 위 세 스텝과 달리 케어포가 아니라 longtermcare.or.kr 공개조회라 로그인·인증서가 없다
      # → headless 래퍼 불필요(래퍼는 keyring 자격증명 주입이 목적). 기관기호(=config 의 ctmnumb)만
      #   있으면 되므로 CONFIG_YAML 만 넘기고 스크립트가 직접 파일로 떨군다.
      # 실측 지점당 2.7초(요청 2건 + 예의상 2초 간격) — playwright 도 안 쓴다.
      # 🔴 미확인 리스크: 이 조회를 GitHub Actions 러너(클라우드 IP)에서 시도한 적이 없다.
      #    공단이 클라우드 대역을 차단/캡차하면 이 스텝이 실패한다(수집 실패 시 종료코드 1).
      #    continue-on-error 로 본 점검은 그대로 진행되고, 18①은 judge18 이 '주의(미수집)' 를 내
      #    조용히 묻히지 않는다 — 스텝 초록/로그 한 줄에 의존하지 않게 한 것(선례: item20).
      - name: 18① 롱텀 공개조회 게시율 수집 (러너 내 임시 — 커밋 안 함)
        continue-on-error: true
        timeout-minutes: 5
        env:
          CONFIG_YAML: ${{ secrets.CONFIG_YAML }}
          BRANCH:      ${{ matrix.name }}
          CI: "true"
        run: python -X utf8 -m audit.collect_ltc_public "$BRANCH"

      - name: 지점 점검 실행
        env:
          CAREFOR_ID:        ${{ secrets.CAREFOR_ID }}
          CAREFOR_PW:        ${{ secrets.CAREFOR_PW }}
          CONFIG_YAML:       ${{ secrets.CONFIG_YAML }}
          AUDIT_WEBHOOK_URL: ${{ secrets.AUDIT_WEBHOOK_URL }}
          NOTION_TOKEN:      ${{ secrets.NOTION_TOKEN }}
          AUDIT_LIMIT:       ${{ github.event.inputs.limit || '0' }}
          AUDIT_TEST:        ${{ github.event.inputs.test_mode || 'false' }}
          AUDIT_BRANCH:      ${{ matrix.name }}
          AUDIT_SKIP_UPLOAD: "true"   # 시트 업로드는 전 지점을 모은 merge job 에서만
          CI: "true"
        run: python run_audit_headless.py

      # test_mode 는 결과를 저장하지 않으므로(save=False) 올릴 파일 자체가 없다 → 스킵.
      - name: 결과 암호화 (public 저장소 아티팩트는 누구나 내려받을 수 있음)
        if: ${{ github.event.inputs.test_mode != 'true' }}
        env:
          KEY:    ${{ secrets.AUDIT_ARTIFACT_KEY }}
          BRANCH: ${{ matrix.name }}
        run: |
          if [ -z "$KEY" ]; then
            echo "ERROR: secrets.AUDIT_ARTIFACT_KEY 가 없습니다."
            echo "  아티팩트에 수급자 실명이 들어가므로 암호화 없이는 올리지 않습니다."
            echo "  Settings > Secrets and variables > Actions 에 임의의 긴 랜덤 문자열로 등록하세요."
            exit 1
          fi
          test -f "audit_results/${BRANCH}.json" || { echo "ERROR: 점검 결과 파일이 없습니다"; exit 1; }
          gpg --batch --yes --symmetric --cipher-algo AES256 \
              --passphrase "$KEY" -o result.json.gpg "audit_results/${BRANCH}.json"

      - name: 결과 업로드 (암호문)
        if: ${{ github.event.inputs.test_mode != 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: audit-${{ matrix.key }}
          path: result.json.gpg
          retention-days: 1   # merge 가 바로 쓰고 버린다 — 노출 창을 최소화
          if-no-files-found: error

  merge:
    needs: [setup, audit]
    # !cancelled(): 일부 지점이 실패해도 성공한 지점만이라도 반영한다(단일 러너 때와 동일).
    if: ${{ !cancelled() && github.event.inputs.test_mode != 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # merge 는 케어포를 긁지 않는다 → playwright 브라우저 설치 불필요(약 3분 절약).
      - name: 패키지 설치
        run: pip install requests PyYAML keyring keyrings.alt openpyxl

      - name: 지점 결과 아티팩트 내려받기
        uses: actions/download-artifact@v4
        with:
          path: _artifacts
          pattern: audit-*

      - name: 복호화 → audit_results/ 복원
        env:
          KEY:    ${{ secrets.AUDIT_ARTIFACT_KEY }}
          MATRIX: ${{ needs.setup.outputs.matrix }}
        run: |
          if [ -z "$KEY" ]; then echo "ERROR: secrets.AUDIT_ARTIFACT_KEY 가 없습니다."; exit 1; fi
          mkdir -p audit_results
          # 아티팩트 이름(audit-<key>)을 지점명으로 되돌려 <지점>.json 으로 복원한다.
          # collector/sheet_upload 는 audit_results/<지점>.json 을 글롭해 읽으므로 파일명이 곧 계약.
          python3 - <<'PY'
          import json, os, subprocess, sys
          from pathlib import Path
          key = os.environ["KEY"]
          inc = json.loads(os.environ["MATRIX"])["include"]
          ok = 0
          for b in inc:
              src = Path("_artifacts") / f"audit-{b['key']}" / "result.json.gpg"
              if not src.exists():
                  print(f"  ⚠️ {b['name']}: 아티팩트 없음(해당 지점 job 실패) — 건너뜀")
                  continue
              dst = Path("audit_results") / f"{b['name']}.json"
              subprocess.run(["gpg", "--batch", "--yes", "--decrypt", "--passphrase", key,
                              "-o", str(dst), str(src)], check=True)
              print(f"  ✅ {b['name']} 복원")
              ok += 1
          if not ok:
              print("ERROR: 복원된 지점이 하나도 없습니다.")
              sys.exit(1)
          PY

      - name: 대시보드 데이터·요약페이지 재생성 + 구글시트 업로드
        env:
          CONFIG_YAML:       ${{ secrets.CONFIG_YAML }}
          AUDIT_WEBHOOK_URL: ${{ secrets.AUDIT_WEBHOOK_URL }}
          AUDIT_MERGE:       "true"
          CI: "true"
        run: python run_audit_headless.py

      - name: 본부 대시보드 발행 (이름 제거)
        # 로컬 audit_results/dashboard_data.js(실명 포함) → docs/ 이름 제거본 생성
        if: ${{ !cancelled() }}
        run: python -m audit.publish_hq_dashboard

      - name: 요약페이지·대시보드 커밋 (개인정보 없음)
        # 시트 업로드가 실패(예: webhook 403)해도 스캔 중 생성된 요약페이지는 갱신·게시 (결과는 공개 요약페이지로 확인)
        if: ${{ !cancelled() }}
        run: |
          git config user.name "audit-bot"
          git config user.email "actions@github.com"
          git add docs/audit_summary.html docs/dashboard_data.js docs/branch_dashboard.html
          if git diff --cached --quiet; then
            echo "요약페이지 변경 없음"
          else
            git commit -m "chore: 지점점검 요약·본부대시보드 자동 갱신 [skip ci]"
            git pull --rebase origin ${{ github.ref_name }} && git push origin HEAD:${{ github.ref_name }}
          fi

  # 지점 job·merge job 중 하나라도 실패하면 알린다(단일 러너 때 실패 알림 스텝과 같은 의미).
  # failure() 대신 result 를 명시적으로 본다 — test_mode 실행에서는 merge 가 'skipped' 인데,
  # needs 중 skipped 가 있으면 dependent job 이 통째로 스킵될 수 있어서다.
  # !cancelled(): 수동 취소했을 때는 슬랙을 울리지 않는다.
  notify-failure:
    needs: [setup, audit, merge]
    if: ${{ !cancelled() && (needs.setup.result == 'failure' || needs.audit.result == 'failure' || needs.merge.result == 'failure') }}
    runs-on: ubuntu-latest
    steps:
      - name: 실패 알림 (슬랙, 통합 알림 채널)
        run: |
          curl -s -X POST https://slack.com/api/chat.postMessage \
            -H "Authorization: Bearer ${{ secrets.SLACK_BOT_TOKEN }}" \
            -H 'Content-type: application/json; charset=utf-8' \
            -d '{"channel":"C0BC37EB38C","text":"⚠️ 지점점검 자동 실행 실패 — GitHub Actions 로그 확인 필요 (weekly_audit)"}'
