name: 지점점검 (평일 매일 아침)

on:
  schedule:
    # 매일(월~금) 07:00 KST = 일~목 22:00 UTC (KST=UTC+9)
    - cron: '0 22 * * 0-4'
  workflow_dispatch:
    inputs:
      test_mode:
        description: '테스트 모드 (저장·시트업로드·요약갱신 없이 동작만 확인)'
        required: false
        default: 'true'
        type: choice
        options: ['true', 'false']
      branch:
        description: '점검할 지점 (전체 또는 지점명)'
        required: false
        default: '전체'
        type: choice
        options: ['전체', '둔산점', '서구점', '천안점', '청주 오창점']
      limit:
        description: '지점당 인원 제한 (0=전체, 테스트 모드 기본 3명)'
        required: false
        default: '0'

# 동시 실행 방지: cron과 수동 dispatch가 겹쳐도 순차 실행
concurrency:
  group: branch-audit
  cancel-in-progress: false

permissions:
  contents: write   # 요약페이지(docs/audit_summary.html) 커밋용

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 패키지 설치
        run: pip install requests PyYAML playwright keyring keyrings.alt openpyxl

      - name: Playwright 브라우저 설치
        run: playwright install chromium --with-deps

      - name: 지점 점검 실행
        env:
          CAREFOR_ID:        ${{ secrets.CAREFOR_ID }}
          CAREFOR_PW:        ${{ secrets.CAREFOR_PW }}
          CONFIG_YAML:       ${{ secrets.CONFIG_YAML }}
          AUDIT_WEBHOOK_URL: ${{ secrets.AUDIT_WEBHOOK_URL }}
          NOTION_TOKEN:      ${{ secrets.NOTION_TOKEN }}
          AUDIT_LIMIT:       ${{ github.event.inputs.limit || '0' }}
          AUDIT_TEST:        ${{ github.event.inputs.test_mode || 'false' }}
          AUDIT_BRANCH:      ${{ github.event.inputs.branch }}
          CI: "true"
        run: python run_audit_headless.py

      - name: 요약페이지 커밋 (개인정보 없음)
        if: ${{ github.event.inputs.test_mode != 'true' }}
        run: |
          git config user.name "audit-bot"
          git config user.email "actions@github.com"
          git add docs/audit_summary.html
          if git diff --cached --quiet; then
            echo "요약페이지 변경 없음"
          else
            git commit -m "chore: 지점점검 요약페이지 자동 갱신 [skip ci]"
            git push
          fi

      - name: 실패 알림 (슬랙, 통합 알림 채널)
        if: failure()
        run: |
          curl -s -X POST https://slack.com/api/chat.postMessage \
            -H "Authorization: Bearer ${{ secrets.SLACK_BOT_TOKEN }}" \
            -H 'Content-type: application/json; charset=utf-8' \
            -d '{"channel":"C0BC37EB38C","text":"⚠️ 지점점검 자동 실행 실패 — GitHub Actions 로그 확인 필요 (weekly_audit)"}'
