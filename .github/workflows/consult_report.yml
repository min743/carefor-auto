name: 상담 공지 (신규상담 미입력 + 대기명단)

# 발송 주기 미정 — 수동 실행만. 주기 확정 시 schedule(cron) 추가 예정.
on:
  workflow_dispatch:
    inputs:
      report:
        description: "보낼 공지"
        required: false
        default: "both"
        type: choice
        options: [both, consult, waitlist]
      dry_run:
        description: "true면 전송 없이 생성만"
        required: false
        default: "false"

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 공지 실행
        env:
          CONSULT_WEBHOOK_URL: ${{ secrets.CONSULT_WEBHOOK_URL }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          FLAG=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            FLAG="--dry-run"
          fi
          if [ "${{ github.event.inputs.report }}" != "waitlist" ]; then
            python consult_report.py $FLAG
          fi
          if [ "${{ github.event.inputs.report }}" != "consult" ]; then
            python waitlist_report.py $FLAG
          fi
