name: 상담 공지 (신규상담 미입력 + 대기명단)

# run-name 에 '무엇을 보냈는지'를 기록 → gate가 제목을 보고 실제 consult 발송만 중복 판정.
# (dry-run·waitlist-only 런은 consult 발송으로 치지 않아 오스킵 방지)
run-name: "상담공지 [${{ github.event.inputs.report || 'consult' }}]${{ github.event.inputs.dry_run == 'true' && ' DRYRUN' || '' }}"

# 발송 구조 (2026-07-10 현행):
#   schedule cron — 매일 08:00 KST 예약. ⚠️ GitHub 스케줄러는 수 시간(9~12h) 지연되므로
#     실제 도착은 오후~저녁이 될 수 있다. 정시 발송이 필요하면 cron-job.org에
#     workflow_dispatch 호출 job을 등록해야 한다(2026-07-10 기준 미등록 — 출석관리에만 등록됨).
#   gate: 오늘(KST) consult를 실제 발송한 성공 런이 있으면 스킵 (report-type·dry-run 구분).
# 수동 실행: dry_run=true(미리보기) / force=true(무조건 발송) / report(both|consult|waitlist)

# 동시 실행 방지: 외부 dispatch·예약·수동이 겹쳐도 순차 실행 → 뒤쪽은 gate에서 스킵
concurrency:
  group: consult-report
  cancel-in-progress: false

permissions:
  contents: write   # 본부 공유 요약페이지(docs/consult_summary.html) 커밋용

on:
  # ⚠️ GitHub schedule 크론 제거(2026-07-15): 9~12h 지연 실행이 '밤 오발송'을 유발했음.
  #    정시 트리거는 전적으로 cron-job.org가 담당한다.
  #      · job 8064621  : 매일 08:00(월~토) '업데이트만'(dry_run=true) — 발송 없음
  #      · job(신규)     : 화·목 09:30 지점방(C0870HLTG9Z) 실제 발송(+센터장 4명 태그)
  #    수동 실행/백업은 workflow_dispatch로만. 게이트가 하루 1회 실발송으로 중복 방지.
  workflow_dispatch:
    inputs:
      report:
        description: "보낼 공지"
        required: false
        default: "consult"
        type: choice
        options: [both, consult, waitlist]
      dry_run:
        description: "true면 전송 없이 생성만"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]
      force:
        description: "무조건 발송 (이미 발송됐어도)"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]
      channel:
        description: "발송 채널 ID (비우면 기본 프로그램관리 채널). 지점방=C0870HLTG9Z"
        required: false
        default: ""
      mentions:
        description: "태그할 이름(콤마구분). 예: 박경민,김민진,김미림,박세영"
        required: false
        default: ""

jobs:
  gate:
    runs-on: ubuntu-latest
    outputs:
      send: ${{ steps.decide.outputs.send }}
    steps:
      - name: 오늘 발송 여부 판단
        id: decide
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          FORCE: ${{ github.event.inputs.force || 'false' }}
          DRYRUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: |
          python3 - <<'EOF'
          import json, os, urllib.request
          from datetime import datetime, timedelta, timezone

          force = os.environ["FORCE"] == "true"
          dryrun = os.environ["DRYRUN"] == "true"
          out = open(os.environ["GITHUB_OUTPUT"], "a")

          if dryrun or force:
              out.write("send=yes\n")
              print("강제/미리보기 — 발송 진행")
              raise SystemExit(0)

          # 정례 발송 시작일 가드: 2026-07-21(화)부터 화·목 발송 시작.
          #  사용자 요청 '다음주부터' → 이번 주 목(2026-07-16)은 스킵. 7/21 지나면 자동 무효(자기만료).
          #  (업데이트 dry_run은 위에서 이미 통과 — 매일 갱신엔 영향 없음)
          _kst_now = datetime.now(timezone(timedelta(hours=9)))
          if _kst_now.date() < __import__("datetime").date(2026, 7, 21):
              out.write("send=no\n")
              print(f"정례 발송 시작(2026-07-21) 이전({_kst_now.date()}) — 발송 스킵")
              raise SystemExit(0)

          # 오늘(KST) 이미 성공한 실행이 있으면 스킵
          kst = timezone(timedelta(hours=9))
          midnight = datetime.now(kst).replace(hour=0, minute=0, second=0, microsecond=0)
          since = midnight.astimezone(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ")
          url = (f"https://api.github.com/repos/{os.environ['REPO']}/actions/workflows/"
                 f"consult_report.yml/runs?status=success&created=%3E%3D{since}&per_page=20")
          req = urllib.request.Request(url, headers={
              "Authorization": "Bearer " + os.environ["GH_TOKEN"],
              "Accept": "application/vnd.github+json"})
          runs = json.loads(urllib.request.urlopen(req, timeout=30).read())["workflow_runs"]

          def sent_consult(r):
              # run-name 제목으로 '실제 consult 발송' 여부 판정 (dry-run·waitlist-only 제외)
              t = r.get("display_title", "") or ""
              return ("[consult]" in t or "[both]" in t) and "DRYRUN" not in t

          prior = [r for r in runs
                   if str(r["id"]) != os.environ["RUN_ID"] and sent_consult(r)]
          if prior:
              out.write("send=no\n")
              print(f"오늘 consult 이미 발송됨 ({prior[0]['run_started_at']}, {prior[0].get('display_title')}) — 스킵")
          else:
              out.write("send=yes\n")
              print("오늘 consult 발송 이력 없음 — 발송 진행")
          EOF

      - name: 게이트 실패 알림 (조용한 미발송 방지)
        if: failure()
        run: |
          curl -s -X POST https://slack.com/api/chat.postMessage \
            -H "Authorization: Bearer ${{ secrets.SLACK_BOT_TOKEN }}" \
            -H 'Content-type: application/json; charset=utf-8' \
            -d '{"channel":"C0BC37EB38C","text":"⚠️ 상담 공지 게이트 실패 — 발송 여부 미판정(오늘 미발송 가능). 로그 확인 (consult_report gate)"}'

  report:
    runs-on: ubuntu-latest
    needs: gate
    if: needs.gate.outputs.send == 'yes'
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # publish_excel/consult_excel이 openpyxl을 쓴다. 이게 없어 2026-07-10까지
      # '상세 엑셀 재생성' 스텝이 매일 ModuleNotFoundError로 죽고 있었다
      # (continue-on-error가 conclusion을 success로 보고해 드러나지 않음).
      - name: 패키지 설치
        run: pip install openpyxl

      - name: 공지 실행 (지점별 엑셀 재생성 → 드라이브 갱신 → 링크 포함 슬랙 공지)
        env:
          CONSULT_WEBHOOK_URL: ${{ secrets.CONSULT_WEBHOOK_URL }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          GOOGLE_OAUTH_JSON: ${{ secrets.GOOGLE_OAUTH_JSON }}
          CONSULT_CHANNEL: ${{ github.event.inputs.channel }}
          CONSULT_MENTIONS: ${{ github.event.inputs.mentions }}
        run: |
          # 예약/외부 자동 실행은 상담 미입력만. 수동 실행은 입력값(기본 consult) 따름.
          REPORT="${{ github.event.inputs.report || 'consult' }}"
          FLAG=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            FLAG="--dry-run"
          fi
          if [ "$REPORT" != "waitlist" ]; then
            # publish_excel: 지점 '제외 ✔' 수집 → 엑셀 재생성 → 드라이브 덮어쓰기
            #                → 표 + 지점별 엑셀 링크를 담아 슬랙 발송.
            # 드라이브/OAuth 장애로 실패하면 링크 없는 기존 경로로 폴백해 공지 자체는 반드시 내보낸다
            # (2026-07-07 사고: 잘 돌아가는 발송 경로는 검증 전 제거 금지).
            # 슬랙 발송은 publish_excel의 마지막 동작이라, 실패 시점엔 아직 미발송 → 중복 발송 없음.
            if ! python publish_excel.py $FLAG; then
              echo "::warning::publish_excel 실패 → consult_report 폴백 발송(엑셀 링크 없음)"
              python consult_report.py $FLAG
            fi
          fi
          if [ "$REPORT" != "consult" ]; then
            python waitlist_report.py $FLAG
          fi

      # 아래 스텝들은 '발송 이후' 작업 — 실패해도 런을 실패로 만들지 않음(continue-on-error).
      # 이유: 발송은 이미 성공했는데 여기서 실패로 런이 죽으면, 백업 런의 gate가
      #       '오늘 성공 없음'으로 보고 공지를 중복 발송함. 발송 무결성 > 요약 최신성.
      # ⚠️ continue-on-error 스텝은 실패해도 API가 conclusion=success로 보고한다.
      #    성공 여부는 반드시 로그(outcome)로 확인할 것.
      # 요약페이지는 '매일 업데이트'(dry_run 포함) 대상 — 조건 없이 항상 갱신.
      # (발송은 화·목만, 요약/엑셀은 매일. continue-on-error라 실패해도 런 영향 없음)
      - name: 본부 공유 요약페이지 생성 (개인정보 없음)
        continue-on-error: true
        env:
          CONSULT_WEBHOOK_URL: ${{ secrets.CONSULT_WEBHOOK_URL }}
        run: python consult_summary_page.py

      - name: 요약페이지 커밋 (docs/consult_summary.html)
        continue-on-error: true
        run: |
          git config user.name "consult-bot"
          git config user.email "actions@github.com"
          git add docs/consult_summary.html
          if git diff --cached --quiet; then
            echo "요약페이지 변경 없음"; exit 0
          fi
          git commit -m "chore: 상담 현황 요약페이지 자동 갱신 [skip ci]"
          # 지점점검 봇 등과 동시 push 경합 대비 rebase 후 재시도
          ok=0
          for i in 1 2 3; do
            if git pull --rebase origin ${{ github.ref_name }} \
               && git push origin HEAD:${{ github.ref_name }}; then ok=1; break; fi
            echo "push 재시도 $i"; sleep 5
          done
          [ "$ok" = 1 ] || { echo "::warning::요약페이지 push 실패 — 다음 실행에서 갱신됨"; exit 1; }

      - name: 실패 알림 (슬랙, 통합 알림 채널)
        if: failure()
        run: |
          curl -s -X POST https://slack.com/api/chat.postMessage \
            -H "Authorization: Bearer ${{ secrets.SLACK_BOT_TOKEN }}" \
            -H 'Content-type: application/json; charset=utf-8' \
            -d '{"channel":"C0BC37EB38C","text":"⚠️ 상담 공지 발송 실패 — GitHub Actions 로그 확인 필요 (consult_report)"}'
