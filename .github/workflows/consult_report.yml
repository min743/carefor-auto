name: 상담 공지 (신규상담 미입력 + 대기명단)

# 매일 아침 7시(KST) 자동 발송 + 수동 실행.
# 동시 실행 방지: 예약/수동 dispatch가 겹쳐도 순차 실행
concurrency:
  group: consult-report
  cancel-in-progress: false

on:
  schedule:
    - cron: '2 22 * * *'   # 매일 KST 07:02 (UTC 22:02) — 정각은 지연 커서 2분 늦춤
  workflow_dispatch:
    inputs:
      report:
        description: "보낼 공지"
        required: false
        default: "both"
        type: choice
        options: [both, consult, waitlist]
      dry_run:
        description: "true면 전송 없이 생성만"
        required: false
        default: "false"

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 공지 실행
        env:
          CONSULT_WEBHOOK_URL: ${{ secrets.CONSULT_WEBHOOK_URL }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          # 예약(schedule) 자동 실행은 상담 미입력만. 수동 실행은 입력값(기본 both) 따름.
          REPORT="${{ github.event.inputs.report || 'consult' }}"
          FLAG=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            FLAG="--dry-run"
          fi
          if [ "$REPORT" != "waitlist" ]; then
            python consult_report.py $FLAG
          fi
          if [ "$REPORT" != "consult" ]; then
            python waitlist_report.py $FLAG
          fi

      - name: 실패 알림 (슬랙, 통합 알림 채널)
        if: failure()
        run: |
          curl -s -X POST https://slack.com/api/chat.postMessage \
            -H "Authorization: Bearer ${{ secrets.SLACK_BOT_TOKEN }}" \
            -H 'Content-type: application/json; charset=utf-8' \
            -d '{"channel":"C0BC37EB38C","text":"⚠️ 상담 공지 발송 실패 — GitHub Actions 로그 확인 필요 (consult_report)"}'
