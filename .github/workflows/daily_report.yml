name: 출석관리

on:
  schedule:
    - cron: '0 2 * * 1-5'  # 월~금 KST 11:00 (UTC 02:00)
    - cron: '0 2 * * 6'    # 토요일 KST 11:00 (UTC 02:00)
  workflow_dispatch:
    inputs:
      dry_run:
        description: '미리보기만 (슬랙 전송 안 함)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  report:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 패키지 설치
        run: pip install -r requirements.txt

      - name: 한글 폰트 설치
        run: sudo apt-get install -y fonts-nanum

      - name: Playwright 브라우저 설치
        run: playwright install chromium --with-deps

      - name: 출석 현황 수집 및 슬랙 전송
        env:
          CAREFOR_ID:       ${{ secrets.CAREFOR_ID }}
          CAREFOR_PW:       ${{ secrets.CAREFOR_PW }}
          SLACK_BOT_TOKEN:  ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          CONFIG_YAML:      ${{ secrets.CONFIG_YAML }}
          CI: "true"
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: python run_headless.py
