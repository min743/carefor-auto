name: 차량관리 (매일 시트갱신 · 월요일 보고)

# run-name에 '갱신만'인지 '보고'인지 남겨 실행 목록에서 바로 구분.
run-name: "차량관리 ${{ (github.event.schedule == '0 0 * * 1-6' || github.event.inputs.dry_run == 'true') && '[시트갱신]' || '[보고]' }}"

# 스케줄 2개:
#   · 월~토 09:00 KST — 케어포 주행거리/오일 + cyberts 검사기간을 구글시트에 갱신만
#     (DRY_RUN=true → 슬랙 발송 없음. 시트 저장은 그대로 수행. 일요일은 안 돎)
#   · 매주 월 11:10 KST — 위와 동일 수집 후 슬랙 보고까지 발송
# ⚠️ 위 갱신 크론 문자열을 바꾸면 run-name·DRY_RUN 식의 비교값도 함께 고쳐야 한다
#    (안 고치면 갱신 런이 슬랙을 발송한다).
# cron-job.org의 기존 호출(workflow_dispatch, 기본 입력)은 아래 게이트에서
# 무조건 스킵된다 — 중복 발송 없음. 수동 실행이 필요하면:
#   - 미리보기(시트만 갱신): dry_run=true
#   - 실제 발송: force=true

# 동시 실행 방지: cron과 수동/외부 dispatch가 겹쳐도 순차 실행
concurrency:
  group: vehicle-report
  cancel-in-progress: false

on:
  # ⚠️ GitHub schedule 제거(2026-07-15): '0 0 * * 1-6'(매일 시트갱신)이 9~11h 지연돼
  #   실제로 매일 16~20시로 들쭉날쭉 실행됐음. 정시 트리거는 cron-job.org 전담:
  #     · job 8099996 : 매일 09:00(월~토) dry_run=true → 시트갱신만(슬랙X)
  #     · job 8073514 : 월 11:10 force=true → 주간 슬랙 보고
  workflow_dispatch:
    inputs:
      dry_run:
        description: '미리보기만 (슬랙 전송 안 함)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      force:
        description: '수동 실제 발송 (이걸 true로 해야만 dispatch로 발송됨)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  vehicle-report:
    runs-on: ubuntu-latest
    timeout-minutes: 30   # 멈춘 브라우저가 최대 6시간 방치되는 것 방지
    # schedule(매일 09:00 갱신 / 월 11:10 보고)은 항상 실행. workflow_dispatch는
    # force=true(실제 발송) 또는 dry_run=true(미리보기)일 때만 실행
    # — 기본 입력으로 들어오는 외부 호출 차단.
    if: github.event_name == 'schedule' || github.event.inputs.force == 'true' || github.event.inputs.dry_run == 'true'

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 패키지 설치
        run: pip install -r requirements.txt

      - name: Playwright 브라우저 설치
        run: playwright install chromium --with-deps

      - name: 차량관리 보고 슬랙 전송
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL:   C0870HLTG9Z
          CAREFOR_ID:      ${{ secrets.CAREFOR_ID }}
          CAREFOR_PW:      ${{ secrets.CAREFOR_PW }}
          # 매일 09:00 크론은 시트 갱신만(슬랙 발송 없음). 월 11:10 크론·force는 발송.
          DRY_RUN: ${{ (github.event.schedule == '0 0 * * 1-6' || github.event.inputs.dry_run == 'true') && 'true' || 'false' }}
          NOTION_TOKEN:    ${{ secrets.NOTION_TOKEN }}
        run: python run_vehicle_headless.py

      # 차량 시트 갱신과 같은 주기로 노션 보험(보험사·만기) → _보험 탭. 슬랙 없음.
      # 만기 지난 건은 push_insurance 가 '확인 필요'로 제외(공란) → 앱엔 유효 건만 표시.
      # 차량 스텝이 실패해도 보험은 독립이라 always() 로 시도.
      - name: 노션 보험 → 시트 _보험
        if: always()
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: python -X utf8 -m audit.push_insurance

      - name: 실패 알림 (슬랙, 통합 알림 채널)
        if: failure()
        run: |
          curl -s -X POST https://slack.com/api/chat.postMessage \
            -H "Authorization: Bearer ${{ secrets.SLACK_BOT_TOKEN }}" \
            -H 'Content-type: application/json; charset=utf-8' \
            -d '{"channel":"C0BC37EB38C","text":"⚠️ 차량관리 주간 보고 실패 — GitHub Actions 로그 확인 필요 (weekly_vehicle)"}'
