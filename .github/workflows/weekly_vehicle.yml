name: 차량관리 주간 보고

# 자동 발송은 매주 월요일 11:10 KST의 schedule cron 한 곳에서만 나간다.
# cron-job.org의 기존 호출(workflow_dispatch, 기본 입력)은 아래 게이트에서
# 무조건 스킵된다 — 중복 발송 없음. 수동 실행이 필요하면:
#   - 미리보기: dry_run=true (슬랙 전송 없음)
#   - 실제 발송: force=true

# 동시 실행 방지: cron과 수동/외부 dispatch가 겹쳐도 순차 실행
concurrency:
  group: vehicle-report
  cancel-in-progress: false

on:
  schedule:
    - cron: '10 2 * * 1'  # 매주 월 KST 11:10 (UTC 02:10)
  workflow_dispatch:
    inputs:
      dry_run:
        description: '미리보기만 (슬랙 전송 안 함)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      force:
        description: '수동 실제 발송 (이걸 true로 해야만 dispatch로 발송됨)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  vehicle-report:
    runs-on: ubuntu-latest
    timeout-minutes: 30   # 멈춘 브라우저가 최대 6시간 방치되는 것 방지
    # schedule(월 11:10)은 항상 실행. workflow_dispatch는 force=true(실제 발송) 또는
    # dry_run=true(미리보기)일 때만 실행 — 기본 입력으로 들어오는 외부 호출 차단.
    if: github.event_name == 'schedule' || github.event.inputs.force == 'true' || github.event.inputs.dry_run == 'true'

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 패키지 설치
        run: pip install -r requirements.txt

      - name: Playwright 브라우저 설치
        run: playwright install chromium --with-deps

      - name: 차량관리 보고 슬랙 전송
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL:   C0870HLTG9Z
          CAREFOR_ID:      ${{ secrets.CAREFOR_ID }}
          CAREFOR_PW:      ${{ secrets.CAREFOR_PW }}
          DRY_RUN:         ${{ github.event.inputs.dry_run || 'false' }}
          NOTION_TOKEN:    ${{ secrets.NOTION_TOKEN }}
        run: python run_vehicle_headless.py

      - name: 실패 알림 (슬랙, 통합 알림 채널)
        if: failure()
        run: |
          curl -s -X POST https://slack.com/api/chat.postMessage \
            -H "Authorization: Bearer ${{ secrets.SLACK_BOT_TOKEN }}" \
            -H 'Content-type: application/json; charset=utf-8' \
            -d '{"channel":"C0BC37EB38C","text":"⚠️ 차량관리 주간 보고 실패 — GitHub Actions 로그 확인 필요 (weekly_vehicle)"}'
