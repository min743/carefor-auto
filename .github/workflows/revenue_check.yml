name: 매출 점검 (본부 실행)

# 본부가 Actions 탭에서 'Run workflow' 를 눌러 직접 최신 매출점검을 돌린다.
# 결과는 공유 허브의 '매출 점검' 페이지에 자동 반영된다(이름 마스킹 적용).
#
# ⚠️ 산출물에는 수급자 실명이 들어 있다 → 저장소에 커밋하지 않는다(.gitignore 이중 차단).
#    허브에 올릴 때 deploy_hub_ci 가 마스킹한다.

on:
  workflow_dispatch:
    inputs:
      branch:
        description: '지점 (전체 / 청주 / 둔산 / 서구 / 천안)'
        required: false
        default: '전체'
      ym:
        description: '연월 YYYY-MM (비우면 이번 달)'
        required: false
        default: ''

# ★케어포는 계정이 하나다. 지점점검(weekly_audit)과 같은 그룹을 써서
#   동시 로그인 충돌을 막는다. cancel-in-progress:false → 겹치면 뒤로 줄 서서 기다린다.
#   (그룹 이름을 바꾸면 충돌 방지가 깨진다 — weekly_audit.yml 과 반드시 동일해야 함)
concurrency:
  group: branch-audit
  cancel-in-progress: false

jobs:
  revenue:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: pip install -r requirements-ci.txt

      - name: Playwright 브라우저 설치
        run: playwright install chromium --with-deps

      - name: 매출점검 실행 (케어포 접속)
        id: run
        env:
          CAREFOR_ID:  ${{ secrets.CAREFOR_ID }}
          CAREFOR_PW:  ${{ secrets.CAREFOR_PW }}
          CONFIG_YAML: ${{ secrets.CONFIG_YAML }}
          PYTHONIOENCODING: utf-8
          CI: "true"
        run: python revenue_check_headless.py "${{ inputs.branch }}" ${{ inputs.ym }}

      - name: 허브 '매출 점검' 페이지 갱신 (이름 마스킹)
        env:
          GOOGLE_OAUTH_JSON: ${{ secrets.GOOGLE_OAUTH_JSON }}
          PYTHONIOENCODING: utf-8
        run: python -m audit.deploy_hub_ci --revenue-from "${{ steps.run.outputs.combined }}"

      - name: 실명 파일이 커밋 대상에 없는지 확인 (안전장치)
        run: |
          LEAK=$(git status --porcelain | grep -E '매출/[^/]+/|매출점검_합본_' || true)
          if [ -n "$LEAK" ]; then
            echo "::error::실명 산출물이 git 에 노출됨 — .gitignore 확인 필요"
            echo "$LEAK"
            exit 1
          fi
          echo "실명 파일 노출 없음 (gitignore 정상)"
