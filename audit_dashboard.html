<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>지점관리 점검 대시보드</title>
<script src="audit_results/dashboard_data.js" onerror="window.AUDIT_DATA={};window.AUDIT_ITEMS=null;"></script>
<style>
  * { box-sizing: border-box; }
  body { font-family: '맑은 고딕', 'Malgun Gothic', sans-serif; margin: 0; background: #f4f6fa; color: #222; }
  header { background: #2f5496; color: #fff; padding: 14px 24px; display: flex; align-items: center; gap: 16px; }
  header h1 { font-size: 19px; margin: 0; }
  header .sub { font-size: 12px; opacity: .85; }
  .tabs { display: flex; gap: 6px; padding: 12px 24px 0; }
  .tab { padding: 9px 22px; border-radius: 8px 8px 0 0; background: #d7dfee; cursor: pointer; font-weight: bold; font-size: 14px; }
  .tab.on { background: #fff; color: #2f5496; box-shadow: 0 -2px 6px rgba(0,0,0,.06); }
  .wrap { background: #fff; margin: 0 24px 24px; padding: 18px; border-radius: 0 8px 8px 8px; box-shadow: 0 2px 8px rgba(0,0,0,.07); }
  .meta { font-size: 13px; color: #666; margin-bottom: 12px; display:flex; gap:18px; flex-wrap:wrap; }
  .summary { display: flex; gap: 12px; margin-bottom: 14px; flex-wrap: wrap; }
  .card { background: #f6f8fc; border: 1px solid #e0e6f0; border-radius: 8px; padding: 10px 18px; text-align: center; min-width: 90px; }
  .card b { display: block; font-size: 22px; }
  table { border-collapse: collapse; width: 100%; font-size: 13px; }
  th, td { border: 1px solid #dbe2ec; padding: 7px 9px; vertical-align: top; }
  th { background: #eef2f9; }
  td.center { text-align: center; white-space: nowrap; }
  .light { display: inline-block; width: 14px; height: 14px; border-radius: 50%; vertical-align: -2px; margin-right: 5px; }
  .g-ok   { background: #35a94e; } .t-ok   { color: #2c8a41; font-weight: bold; }
  .g-bad  { background: #d93a3a; } .t-bad  { color: #c02020; font-weight: bold; }
  .g-na   { background: #b9b9b9; } .t-na   { color: #888; }
  .g-warn { background: #e8a01f; } .t-warn { color: #b57a00; font-weight: bold; }
  .g-man  { background: #6f8fd6; } .t-man  { color: #4a69b0; font-weight: bold; }
  select.mstat { padding: 3px 6px; border: 1px solid #ccc; border-radius: 4px; }
  input.memo { width: 100%; border: 1px solid #ddd; border-radius: 4px; padding: 4px 6px; font-size: 12px; }
  .criteria { color: #555; font-size: 12px; line-height: 1.45; }
  .loc { color: #888; font-size: 11px; }
  .btnrow { margin: 12px 0; display: flex; gap: 8px; }
  button { background: #2f5496; color: #fff; border: 0; border-radius: 6px; padding: 8px 16px; cursor: pointer; font-weight: bold; }
  button.gray { background: #7a869a; }
  .detail-detail { font-size: 12px; color:#444; }
  .nodata { padding: 40px; text-align: center; color: #999; }
  details { margin-top: 16px; }
  details summary { cursor: pointer; font-weight: bold; color: #2f5496; padding: 6px 0; }
  .small-table th, .small-table td { font-size: 12px; padding: 4px 7px; }
</style>
</head>
<body>
<header>
  <h1>📋 지점관리 점검 대시보드</h1>
  <div class="sub">평가 매뉴얼 36개 항목 — 자동수집(run_audit.py) + 수기입력 / 데이터: audit_results/</div>
</header>
<div class="tabs" id="tabs"></div>
<div class="wrap" id="content"></div>

<script>
const BRANCHES = ['둔산점','서구점','천안점','청주 오창점'];
const DATA = window.AUDIT_DATA || {};
const ITEMS = window.AUDIT_ITEMS || [];
let cur = localStorage.getItem('audit_tab') || BRANCHES[0];

function manualKey(branch){ return 'audit_manual_' + branch; }
function loadManual(branch){ try { return JSON.parse(localStorage.getItem(manualKey(branch))||'{}'); } catch(e){ return {}; } }
function saveManual(branch, obj){ localStorage.setItem(manualKey(branch), JSON.stringify(obj)); }

function light(status){
  if(status==='양호') return '<span class="light g-ok"></span><span class="t-ok">양호</span>';
  if(status==='미흡') return '<span class="light g-bad"></span><span class="t-bad">미흡</span>';
  if(status==='주의') return '<span class="light g-warn"></span><span class="t-warn">주의</span>';
  if(status==='해당없음') return '<span class="light g-na"></span><span class="t-na">해당없음</span>';
  return '<span class="light g-na"></span><span class="t-na">수집전</span>';
}

function render(){
  document.getElementById('tabs').innerHTML = BRANCHES.map(b=>
    `<div class="tab ${b===cur?'on':''}" onclick="switchTab('${b}')">${b}</div>`).join('');
  const d = DATA[cur];
  const manual = loadManual(cur);
  let html = '';

  html += `<div class="meta">`;
  if(d){
    html += `<span>🕐 자동수집: <b>${d.run_at}</b></span><span>기준일: <b>${d.cutoff}</b></span><span>수급자: <b>${d.people}명</b> (퇴소자 포함)</span>`;
    const st = (d.analysis||{}).stats;
    if(st) html += `<span>낙상↔욕구 대조: <b>${st.total_rounds}</b>회차 / 불일치 <b class="t-bad">${st.disc}</b>건</span>`;
  } else {
    html += `<span class="t-na">아직 자동수집 데이터가 없습니다 — <b>py run_audit.py --branch ${cur}</b> 실행 후 새로고침</span>`;
  }
  html += `</div>`;

  // 요약 카드
  let nOk=0, nBad=0, nWait=0, nMan=0;
  ITEMS.forEach(it=>{
    if(it.method==='manual'){
      const m = manual[it.no];
      if(m && m.status==='양호') nOk++;
      else if(m && m.status==='미흡') nBad++;
      else nMan++;
    } else {
      const r = d && d.item_results && d.item_results[String(it.no)];
      if(r){ if(r.status==='양호') nOk++; else nBad++; }
      else nWait++;
    }
  });
  html += `<div class="summary">
    <div class="card"><b class="t-ok">${nOk}</b>양호</div>
    <div class="card"><b class="t-bad">${nBad}</b>미흡</div>
    <div class="card"><b class="t-na">${nWait}</b>수집전</div>
    <div class="card"><b class="t-man">${nMan}</b>수기 미입력</div>
  </div>`;

  html += `<div class="btnrow">
    <button onclick="exportAll()">📥 점검표 내보내기(JSON)</button>
    <button class="gray" onclick="location.reload()">🔄 새로고침</button>
  </div>`;

  // 36개 항목 테이블
  html += `<table><tr><th style="width:36px">#</th><th style="width:160px">항목</th><th style="width:80px">방식</th><th style="width:110px">상태</th><th>확인 기준 / 결과</th><th style="width:220px">메모</th></tr>`;
  ITEMS.forEach(it=>{
    let statusHtml='', resultHtml='', memoHtml='';
    if(it.method==='manual'){
      const m = manual[it.no] || {};
      statusHtml = `<select class="mstat" onchange="setManual(${it.no},'status',this.value)">
        ${['미입력','양호','미흡','해당없음'].map(s=>`<option ${((m.status||'미입력')===s)?'selected':''}>${s}</option>`).join('')}
      </select>`;
      resultHtml = `<div class="criteria">${it.criteria}</div><div class="loc">수기 확인 항목</div>`;
      memoHtml = `<input class="memo" value="${(m.memo||'').replace(/"/g,'&quot;')}" placeholder="메모"
        onchange="setManual(${it.no},'memo',this.value)">`;
    } else {
      const r = d && d.item_results && d.item_results[String(it.no)];
      statusHtml = r ? light(r.status) : light(null);
      resultHtml = `<div class="criteria">${it.criteria}</div><div class="loc">케어포 ${it.loc}</div>`
        + (r ? `<div class="detail-detail">▶ ${r.detail}</div>` : '');
      const m = manual[it.no] || {};
      memoHtml = `<input class="memo" value="${(m.memo||'').replace(/"/g,'&quot;')}" placeholder="메모"
        onchange="setManual(${it.no},'memo',this.value)">`;
    }
    html += `<tr>
      <td class="center">${it.no}</td>
      <td><b>${it.name}</b></td>
      <td class="center">${it.method==='manual'?'<span class="t-man">수기</span>':'자동'}</td>
      <td class="center">${statusHtml}</td>
      <td>${resultHtml}</td>
      <td>${memoHtml}</td>
    </tr>`;
  });
  html += `</table>`;

  // 상세 리스트 (자동수집 있을 때)
  if(d){
    const an = d.analysis || {};
    if(d.rows_match && d.rows_match.length){
      const disc = d.rows_match.filter(r=>r[8]==='불일치'||String(r[8]).startsWith('확인'));
      html += `<details><summary>🔎 낙상↔욕구사정 불일치·확인필요 (${disc.length}건)</summary>
        <table class="small-table"><tr><th>수급자</th><th>현황</th><th>낙상평가일</th><th>활동</th><th>걸음걸이</th><th>욕구사정일</th><th>일어나앉기</th><th>옮겨앉기</th><th>판정</th></tr>
        ${disc.map(r=>`<tr>${r.map(c=>`<td>${c}</td>`).join('')}</tr>`).join('')}</table></details>`;
    }
    if(an.halfyear_miss && an.halfyear_miss.length){
      html += `<details><summary>🔎 반기별 평가 누락 (${an.halfyear_miss.length}건)</summary>
        <table class="small-table"><tr><th>수급자</th><th>현황</th><th>반기</th><th>평가</th><th>재적기간</th></tr>
        ${an.halfyear_miss.map(r=>`<tr>${r.map(c=>`<td>${c}</td>`).join('')}</tr>`).join('')}</table></details>`;
    }
    if(an.order_issues && an.order_issues.length){
      html += `<details><summary>🔎 계획-기초평가 순서 확인 (${an.order_issues.length}건)</summary>
        <table class="small-table"><tr><th>수급자</th><th>계획 작성일</th><th>내용</th></tr>
        ${an.order_issues.map(r=>`<tr>${r.map(c=>`<td>${c}</td>`).join('')}</tr>`).join('')}</table></details>`;
    }
    if(an.plan_issues && an.plan_issues.length){
      html += `<details><summary>🔎 급여제공계획 발송·서명 문제 (${an.plan_issues.length}건)</summary>
        <table class="small-table"><tr><th>수급자</th><th>작성일</th><th>적용기간</th><th>발송상태</th><th>동의일</th><th>문제</th></tr>
        ${an.plan_issues.map(r=>`<tr>${r.map(c=>`<td>${c}</td>`).join('')}</tr>`).join('')}</table></details>`;
    }
    if(an.rows_check && an.rows_check.length){
      html += `<details><summary>🔎 수급자별 연간작성·계약 점검 (${an.rows_check.length}명)</summary>
        <table class="small-table"><tr><th>수급자</th><th>현황</th><th>수급기간</th><th>누락①</th><th>누락②</th><th>누락③</th><th>표준약관</th><th>계약연속</th><th>계획점검</th></tr>
        ${an.rows_check.map(r=>`<tr>${r.map(c=>`<td>${c}</td>`).join('')}</tr>`).join('')}</table></details>`;
    }
  }

  document.getElementById('content').innerHTML = html;
}

function switchTab(b){ cur=b; localStorage.setItem('audit_tab', b); render(); }
function setManual(no, key, val){
  const m = loadManual(cur);
  m[no] = m[no] || {};
  m[no][key] = val;
  saveManual(cur, m);
  render();
}
function exportAll(){
  const out = {};
  BRANCHES.forEach(b=>{
    out[b] = { auto: DATA[b] ? DATA[b].item_results : null, manual: loadManual(b),
               run_at: DATA[b] ? DATA[b].run_at : null };
  });
  const blob = new Blob([JSON.stringify(out, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = '지점점검표_' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
}

if(!ITEMS.length){
  document.getElementById('content').innerHTML =
    '<div class="nodata">audit_results/dashboard_data.js 가 없습니다.<br>먼저 <b>py run_audit.py</b> 를 한 번 실행하세요 (항목 정의가 함께 생성됩니다).</div>';
  document.getElementById('tabs').innerHTML = '';
} else {
  render();
}
</script>
</body>
</html>
