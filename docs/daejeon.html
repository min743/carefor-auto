<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<meta name="theme-color" content="#1e3a8a">
<title>방문요양 대전점 운행기록</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: 'Malgun Gothic', -apple-system, BlinkMacSystemFont, sans-serif;
    background: #f4f6f8;
    color: #2c3e50;
    min-height: 100vh;
  }
  .header {
    background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
    color: white;
    padding: 16px 20px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    position: sticky;
    top: 0;
    z-index: 50;
  }
  .header h1 { font-size: 18px; font-weight: 700; }
  .header p { font-size: 12px; opacity: 0.85; margin-top: 2px; }
  .container { padding: 16px; max-width: 600px; margin: 0 auto; }

  .card {
    background: white;
    border-radius: 12px;
    padding: 20px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    margin-bottom: 16px;
  }
  .card-title {
    font-size: 14px;
    font-weight: 700;
    color: #1e3a8a;
    margin-bottom: 16px;
    padding-bottom: 10px;
    border-bottom: 2px solid #e8f0fe;
  }
  .form-group { margin-bottom: 14px; }
  .form-group label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: #4a5568;
    margin-bottom: 6px;
  }
  .form-group label .required { color: #e53e3e; margin-left: 2px; }
  .form-group input, .form-group select, .form-group textarea {
    width: 100%;
    padding: 10px 12px;
    border: 1.5px solid #e2e8f0;
    border-radius: 8px;
    font-size: 15px;
    font-family: inherit;
    color: #2c3e50;
    background: #fafafa;
    transition: border-color 0.2s;
    -webkit-appearance: none;
  }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
    outline: none;
    border-color: #3b82f6;
    background: white;
  }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .km-info {
    background: #f0f4ff;
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 13px;
    color: #3b82f6;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .btn-submit {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, #1e3a8a, #3b82f6);
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    margin-top: 4px;
    transition: opacity 0.2s;
  }
  .btn-submit:active { opacity: 0.85; }
  .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }

  .history-item {
    background: white;
    border-radius: 10px;
    padding: 14px 16px;
    margin-bottom: 10px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.07);
    border-left: 4px solid #3b82f6;
  }
  .repair-item { border-left-color: #e53e3e; }
  .history-date { font-size: 12px; color: #718096; margin-bottom: 4px; }
  .history-main { font-size: 14px; font-weight: 600; color: #2c3e50; }
  .history-detail { font-size: 12px; color: #718096; margin-top: 4px; }
  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 12px;
    font-size: 11px;
    font-weight: 600;
    background: #e8f0fe;
    color: #1e3a8a;
    margin-right: 4px;
  }
  .badge-red { background: #fff0f0; color: #e53e3e; }
  .file-link {
    display: inline-block;
    margin-top: 6px;
    font-size: 12px;
    color: #3b82f6;
    text-decoration: none;
  }

  /* 파일 업로드 */
  .file-upload-area {
    border: 2px dashed #c3d4f0;
    border-radius: 10px;
    padding: 20px;
    text-align: center;
    cursor: pointer;
    background: #f8faff;
    transition: border-color 0.2s, background 0.2s;
  }
  .file-upload-area:hover, .file-upload-area.dragover {
    border-color: #3b82f6;
    background: #e8f0fe;
  }
  .file-upload-area input[type=file] { display: none; }
  .file-upload-icon { font-size: 32px; margin-bottom: 8px; }
  .file-upload-text { font-size: 13px; color: #718096; }
  .file-preview {
    margin-top: 12px;
    padding: 10px 14px;
    background: #f0f9f0;
    border-radius: 8px;
    font-size: 13px;
    color: #38a169;
    display: none;
    align-items: center;
    gap: 8px;
  }
  .file-preview.show { display: flex; }
  .file-preview .remove-file {
    margin-left: auto;
    cursor: pointer;
    color: #e53e3e;
    font-size: 16px;
    font-weight: 700;
  }

  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: #2d3748;
    color: white;
    padding: 12px 24px;
    border-radius: 24px;
    font-size: 14px;
    font-weight: 600;
    z-index: 999;
    transition: transform 0.3s ease;
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.success { background: #38a169; }
  .toast.error { background: #e53e3e; }

  .loading-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    z-index: 998;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
  }
  .loading-overlay.show { display: flex; }
  .spinner {
    width: 48px; height: 48px;
    border: 4px solid rgba(255,255,255,0.3);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  .loading-text { color: white; font-size: 14px; font-weight: 600; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .tabs { display: flex; gap: 6px; margin-bottom: 16px; }
  .tab-btn {
    flex: 1;
    padding: 10px 6px;
    border: 2px solid #e2e8f0;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    background: white;
    color: #718096;
    cursor: pointer;
  }
  .tab-btn.active { border-color: #3b82f6; color: #1e3a8a; background: #e8f0fe; }
  .tab-content { display: none; }
  .tab-content.active { display: block; }
  .empty-state { text-align: center; padding: 40px 20px; color: #a0aec0; font-size: 14px; }
</style>
</head>
<body>

<div class="header">
  <h1>🚗 방문요양 대전점 운행기록</h1>
  <p>233다9797 · 아반떼</p>
</div>

<div class="container">
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('drive', this)">✏️ 운행입력</button>
    <button class="tab-btn" onclick="switchTab('repair', this)">🔧 정비입력</button>
    <button class="tab-btn" onclick="switchTab('history', this)">📋 운행기록</button>
    <button class="tab-btn" onclick="switchTab('repairHistory', this)">🛠 정비기록</button>
  </div>

  <!-- 운행 입력 -->
  <div id="tab-drive" class="tab-content active">
    <div class="card">
      <div class="card-title">🚙 운행 정보</div>
      <div class="km-info">
        <span>📍</span> <span id="currentKmText">현재 누적주행거리 불러오는 중...</span>
      </div>
      <div class="form-group">
        <label>운행일자 <span class="required">*</span></label>
        <input type="date" id="driveDate">
      </div>
      <div class="form-group">
        <label>운전자명 <span class="required">*</span></label>
        <input type="text" id="driverName" placeholder="이름 입력">
      </div>
      <div class="form-group">
        <label>운행목적 <span class="required">*</span></label>
        <input type="text" id="driveReason" placeholder="예: 방문요양, 업무, 차량점검 등">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>출발km <span class="required">*</span></label>
          <input type="number" id="startKm" placeholder="출발 시 계기판" inputmode="numeric">
        </div>
        <div class="form-group">
          <label>운행km <span class="required">*</span></label>
          <input type="number" id="driveKm" placeholder="운행 거리" inputmode="numeric">
        </div>
      </div>
    </div>
    <div class="card">
      <div class="card-title">⛽ 주유 정보 (해당 시)</div>
      <div class="form-group">
        <label>유류비 (원)</label>
        <input type="number" id="fuelCost" placeholder="0" inputmode="numeric">
      </div>
      <div class="form-group">
        <label>비고</label>
        <input type="text" id="driveMemo" placeholder="특이사항">
      </div>
    </div>
    <button class="btn-submit" onclick="submitDrive()">저장하기</button>
  </div>

  <!-- 정비 입력 -->
  <div id="tab-repair" class="tab-content">
    <div class="card">
      <div class="card-title">🔧 정비 정보</div>
      <div class="form-group">
        <label>정비일자 <span class="required">*</span></label>
        <input type="date" id="repairDate">
      </div>
      <div class="form-group">
        <label>정비내역 <span class="required">*</span></label>
        <input type="text" id="repairDetail" placeholder="예: 엔진오일 교환, 타이어 교체 등">
      </div>
      <div class="form-group">
        <label>비고</label>
        <input type="text" id="repairMemo" placeholder="추가 메모">
      </div>
    </div>
    <div class="card">
      <div class="card-title">📎 수리 내역서 첨부 (PDF / 사진)</div>
      <div class="file-upload-area" onclick="document.getElementById('fileInput').click()"
           ondragover="event.preventDefault(); this.classList.add('dragover')"
           ondragleave="this.classList.remove('dragover')"
           ondrop="handleDrop(event)">
        <input type="file" id="fileInput" accept="image/*,application/pdf" onchange="handleFileSelect(this.files[0])">
        <div class="file-upload-icon">📄</div>
        <div class="file-upload-text">클릭하거나 파일을 끌어다 놓으세요<br><small>PDF, JPG, PNG 지원</small></div>
      </div>
      <div class="file-preview" id="filePreview">
        <span>📎</span>
        <span id="fileName"></span>
        <span class="remove-file" onclick="removeFile()">✕</span>
      </div>
    </div>
    <button class="btn-submit" onclick="submitRepair()">저장하기</button>
  </div>

  <!-- 운행기록 조회 -->
  <div id="tab-history" class="tab-content">
    <div id="driveHistoryList"><div class="empty-state">불러오는 중...</div></div>
  </div>

  <!-- 정비기록 조회 -->
  <div id="tab-repairHistory" class="tab-content">
    <div id="repairHistoryList"><div class="empty-state">불러오는 중...</div></div>
  </div>
</div>

<div class="toast" id="toast"></div>
<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <div class="loading-text" id="loadingText">저장 중...</div>
</div>

<script>
// 대전점 운행일지/정비기록 시트: https://docs.google.com/spreadsheets/d/1NTuH71zIK2ej_D8eEKceHndCKzC69R9aE27vtLT6bpw/edit
const DRIVE_LOG_API = 'https://script.google.com/macros/s/AKfycbyKcxI-XNCjNAwTLRPLepGTnX_D1ptC82PgQkq8p79pANHe5ihDcJTuxeMqV3pudwGS/exec';
const CAR_MGMT_API = 'https://script.google.com/macros/s/AKfycbzlrOLKx9_Cs4LnWYPMi9bySTPPpjOHy4pxcwXKJ7F7c4eulGOWs3SZmdRdAgL7sDFi/exec';
const CAR_NUMBER = '233다9797';

let selectedFile = null;
let currentTotalKm = null;

window.onload = () => {
  document.getElementById('driveDate').value = today();
  document.getElementById('repairDate').value = today();
  const saved = localStorage.getItem('lastDriver');
  if (saved) document.getElementById('driverName').value = saved;
  loadCurrentKm();
};

function today() {
  return new Date().toISOString().split('T')[0];
}

async function loadCurrentKm() {
  try {
    const res = await fetch(CAR_MGMT_API, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({ action: 'getAll' })
    });
    const data = await res.json();
    const branchData = data.data?.data || data.data || {};
    const allCars = Object.values(branchData).flat();
    const car = allCars.find(c => c.carNumber && c.carNumber.replace(/\s/g,'') === CAR_NUMBER.replace(/\s/g,''));
    if (car && car.totalKm) {
      currentTotalKm = Number(car.totalKm);
      document.getElementById('currentKmText').textContent = `현재 누적주행거리: ${currentTotalKm.toLocaleString()} km`;
      document.getElementById('startKm').placeholder = currentTotalKm.toLocaleString();
    } else {
      document.getElementById('currentKmText').textContent = '누적주행거리 정보 없음';
    }
  } catch(e) {
    document.getElementById('currentKmText').textContent = '불러오기 실패';
  }
}

// ── 탭 전환 ──
function switchTab(tab, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  btn.classList.add('active');
  if (tab === 'history') loadDriveHistory();
  if (tab === 'repairHistory') loadRepairHistory();
}

// ── 운행기록 저장 ──
async function submitDrive() {
  const date     = document.getElementById('driveDate').value;
  const driver   = document.getElementById('driverName').value.trim();
  const reason   = document.getElementById('driveReason').value.trim();
  const startKm  = document.getElementById('startKm').value;
  const driveKm  = document.getElementById('driveKm').value;
  const fuelCost = document.getElementById('fuelCost').value || '';
  const memo     = document.getElementById('driveMemo').value.trim();

  if (!date || !driver || !reason || !startKm || !driveKm) {
    showToast('필수 항목을 모두 입력해주세요', 'error'); return;
  }
  if (Number(driveKm) <= 0) {
    showToast('운행km을 올바르게 입력해주세요', 'error'); return;
  }

  const totalKm = Number(startKm) + Number(driveKm);
  showLoading(true, '저장 중...');

  try {
    const logRes = await fetch(DRIVE_LOG_API, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({ action: 'addDriveLog', data: { date, driver, reason, startKm: Number(startKm), driveKm: Number(driveKm), fuelCost: fuelCost ? Number(fuelCost) : '', memo } })
    });
    const logData = await logRes.json();
    if (!logData.ok) throw new Error(logData.error || '저장 실패');

    await fetch(CAR_MGMT_API, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({ action: 'updateMileage', data: [{ carNumber: CAR_NUMBER, totalKm, kmDate: date }] })
    });

    currentTotalKm = totalKm;
    localStorage.setItem('lastDriver', driver);
    document.getElementById('driveReason').value = '';
    document.getElementById('startKm').value = totalKm;
    document.getElementById('driveKm').value = '';
    document.getElementById('fuelCost').value = '';
    document.getElementById('driveMemo').value = '';
    document.getElementById('startKm').placeholder = totalKm.toLocaleString();
    document.getElementById('currentKmText').textContent = `현재 누적주행거리: ${totalKm.toLocaleString()} km`;
    showToast('운행기록 저장 완료! ✅', 'success');
  } catch(e) {
    showToast('저장 실패: ' + e.message, 'error');
  } finally {
    showLoading(false);
  }
}

// ── 정비기록 저장 ──
async function submitRepair() {
  const repairDate   = document.getElementById('repairDate').value;
  const repairDetail = document.getElementById('repairDetail').value.trim();
  const memo         = document.getElementById('repairMemo').value.trim();

  if (!repairDate || !repairDetail) {
    showToast('정비일자와 정비내역을 입력해주세요', 'error'); return;
  }

  showLoading(true, selectedFile ? '파일 업로드 중...' : '저장 중...');

  try {
    let fileUrl = '';
    let fileWarn = '';

    // 파일 업로드 — 실패해도 정비기록 저장은 계속 진행 (기록 유실 방지)
    if (selectedFile) {
      try {
        const base64 = await toBase64(selectedFile);
        const upRes = await fetch(DRIVE_LOG_API, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify({
            action: 'uploadFile',
            data: { base64: base64.split(',')[1], mimeType: selectedFile.type, fileName: selectedFile.name, type: 'repair' }
          })
        });
        const upData = await upRes.json();
        if (!upData.ok) throw new Error(upData.error || '업로드 실패');
        fileUrl = upData.data.url;
      } catch(e) {
        fileWarn = ' (⚠️ 파일 업로드는 실패 — 기록만 저장됨)';
      }
      showLoading(true, '정비기록 저장 중...');
    }

    const repairRes = await fetch(DRIVE_LOG_API, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({ action: 'addRepairLog', data: { repairDate, repairDetail, fileUrl, memo } })
    });
    const repairData = await repairRes.json();
    if (!repairData.ok) throw new Error(repairData.error || '저장 실패');

    // 오일 교환 정비면 본부 차량관리 시트의 오일 데이터도 갱신 (주간 보고 판정에 사용됨)
    let oilSynced = false;
    if (/오일/.test(repairDetail)) {
      try {
        const oil = { carNumber: CAR_NUMBER, oilDate: repairDate };
        if (currentTotalKm) { oil.oilKm = currentTotalKm; oil.oilNextKm = currentTotalKm + 8000; }
        const oilRes = await fetch(CAR_MGMT_API, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify({ action: 'updateMileage', data: [oil] })
        });
        oilSynced = (await oilRes.json()).ok;
      } catch(e) { /* 오일 연동 실패해도 정비 저장은 완료 */ }
    }

    document.getElementById('repairDetail').value = '';
    document.getElementById('repairMemo').value = '';
    removeFile();
    showToast((oilSynced ? '정비기록 저장 + 오일 정보 본부 반영 완료! ✅' : '정비기록 저장 완료! ✅') + fileWarn, fileWarn ? 'error' : 'success');
  } catch(e) {
    showToast('저장 실패: ' + e.message, 'error');
  } finally {
    showLoading(false);
  }
}

// ── 운행기록 조회 ──
async function loadDriveHistory() {
  document.getElementById('driveHistoryList').innerHTML = '<div class="empty-state">불러오는 중...</div>';
  try {
    const res = await fetch(DRIVE_LOG_API, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({ action: 'getDriveLogs', limit: 500 })
    });
    const data = await res.json();
    // 시트에 연번만 있는 빈 행이 섞여 있으므로 실제 기록만 걸러 최신순 30건 표시
    const rows = (data.data || [])
      .filter(r => r.date && String(r.date).trim() && r.seq !== '합계')
      .sort((a, b) => new Date(b.date) - new Date(a.date))
      .slice(0, 30);
    if (!data.ok || rows.length === 0) {
      document.getElementById('driveHistoryList').innerHTML = '<div class="empty-state">기록이 없습니다</div>'; return;
    }
    document.getElementById('driveHistoryList').innerHTML = rows.map(r => `
      <div class="history-item">
        <div class="history-date">${fmtDate(r.date)}</div>
        <div class="history-main">${r.driver} · ${r.reason}</div>
        <div class="history-detail">
          <span class="badge">${Number(r.startKm).toLocaleString()}km 출발</span>
          <span class="badge">+${Number(r.driveKm).toLocaleString()}km</span>
          ${r.fuelCost ? `<span class="badge">⛽ ${Number(r.fuelCost).toLocaleString()}원</span>` : ''}
          ${r.memo ? `· ${r.memo}` : ''}
        </div>
      </div>`).join('');
  } catch(e) {
    document.getElementById('driveHistoryList').innerHTML = '<div class="empty-state">불러오기 실패</div>';
  }
}

// ── 정비기록 조회 ──
async function loadRepairHistory() {
  document.getElementById('repairHistoryList').innerHTML = '<div class="empty-state">불러오는 중...</div>';
  try {
    const res = await fetch(DRIVE_LOG_API, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({ action: 'getRepairLogs', limit: 500 })
    });
    const data = await res.json();
    // 시트에 연번만 있는 빈 행이 섞여 있으므로 실제 기록만 걸러 최신순 30건 표시
    const rows = (data.data || [])
      .filter(r => r.repairDate && String(r.repairDate).trim() && r.seq !== '합계')
      .sort((a, b) => new Date(b.repairDate) - new Date(a.repairDate))
      .slice(0, 30);
    if (!data.ok || rows.length === 0) {
      document.getElementById('repairHistoryList').innerHTML = '<div class="empty-state">기록이 없습니다</div>'; return;
    }
    document.getElementById('repairHistoryList').innerHTML = rows.map(r => `
      <div class="history-item repair-item">
        <div class="history-date">${fmtDate(r.repairDate)}</div>
        <div class="history-main">${r.repairDetail}</div>
        <div class="history-detail">
          <span class="badge badge-red">🔧 정비</span>
          ${r.memo ? `· ${r.memo}` : ''}
          ${r.fileUrl && /^https?:/.test(r.fileUrl) ? `<br><a class="file-link" href="${r.fileUrl}" target="_blank">📎 첨부파일 보기</a>` : ''}
        </div>
      </div>`).join('');
  } catch(e) {
    document.getElementById('repairHistoryList').innerHTML = '<div class="empty-state">불러오기 실패</div>';
  }
}

// ── 파일 처리 ──
function handleFileSelect(file) {
  if (!file) return;
  selectedFile = file;
  document.getElementById('fileName').textContent = file.name;
  document.getElementById('filePreview').classList.add('show');
}
function handleDrop(e) {
  e.preventDefault();
  e.currentTarget.classList.remove('dragover');
  handleFileSelect(e.dataTransfer.files[0]);
}
function removeFile() {
  selectedFile = null;
  document.getElementById('fileInput').value = '';
  document.getElementById('filePreview').classList.remove('show');
}
function toBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

// ── 유틸 ──
function fmtDate(v) {
  const d = new Date(v);
  if (isNaN(d)) return v || '';
  const p = n => String(n).padStart(2, '0');
  return `${d.getFullYear()}-${p(d.getMonth() + 1)}-${p(d.getDate())}`;
}
function showToast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + type;
  setTimeout(() => t.classList.remove('show'), 3000);
}
function showLoading(show, text = '저장 중...') {
  document.getElementById('loadingOverlay').classList.toggle('show', show);
  document.getElementById('loadingText').textContent = text;
  document.querySelectorAll('.btn-submit').forEach(b => b.disabled = show);
}
</script>
